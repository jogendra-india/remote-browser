<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title> </title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#ccc;font-family:-apple-system,system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;touch-action:none;-webkit-overflow-scrolling:none}

/* ── nav bar ── */
.nav{display:flex;align-items:center;gap:5px;padding:5px 8px;background:#1a1a2e;border-bottom:1px solid #2a2a4a}
.nav button{background:#2a2a4a;border:none;color:#ccc;width:32px;height:30px;border-radius:4px;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0}
.nav button:hover{background:#3a3a5a}
.nav input{flex:1;height:30px;padding:0 12px;border-radius:15px;border:1px solid #2a2a4a;background:#0d0d1a;color:#ddd;font-size:13px;outline:none;min-width:0}
.nav input:focus{border-color:#4a80c0}
#btn-go{width:auto;padding:0 12px;font-size:13px}

/* ── canvas area ── */
.view{flex:1;display:flex;justify-content:center;align-items:center;background:#0a0a0a;overflow:hidden;position:relative}
#screen{max-width:100%;max-height:100%;cursor:default;image-rendering:auto}
#splash{position:absolute;color:#555;font-size:15px;pointer-events:none}

/* ── status bar ── */
.status{display:flex;justify-content:space-between;padding:3px 10px;background:#1a1a2e;border-top:1px solid #2a2a4a;font-size:11px;color:#666}
</style>
</head>
<body>

<div class="nav">
  <button id="b-back" title="Back" type="button">&#8592;</button>
  <button id="b-fwd" title="Forward" type="button">&#8594;</button>
  <button id="b-rel" title="Reload" type="button">&#8635;</button>
  <form id="url-form" style="display:contents">
    <input id="url" type="text" inputmode="url" placeholder="Enter URL and press Enter" spellcheck="false" autocomplete="off" enterkeyhint="go">
    <button id="btn-go" type="submit">Go</button>
  </form>
</div>

<div class="view" id="view">
  <canvas id="screen" tabindex="0"></canvas>
  <div id="splash">Enter a URL above to start browsing</div>
</div>

<div class="status">
  <span id="st">Connecting&hellip;</span>
  <span id="fps">FPS: &ndash;</span>
</div>

<script>
const canvas  = document.getElementById('screen');
const ctx     = canvas.getContext('2d');
const urlBar  = document.getElementById('url');
const stEl    = document.getElementById('st');
const fpsEl   = document.getElementById('fps');
const splash  = document.getElementById('splash');
const view    = document.getElementById('view');

let ws, frames = 0, fpsT = Date.now(), gotFrame = false;

/* ── WebSocket ── */
function connect() {
  ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws');
  ws.onopen  = () => { stEl.textContent = 'Connected'; sendResize(); };
  ws.onclose = () => { stEl.textContent = 'Disconnected — reconnecting…'; setTimeout(connect, 2000); };
  ws.onerror = () => { stEl.textContent = 'Connection error'; };
  ws.onmessage = (ev) => {
    const d = JSON.parse(ev.data);
    if (d.type === 'frame')  return renderFrame(d.data, d.w, d.h);
    if (d.type === 'url')    return document.activeElement !== urlBar && (urlBar.value = d.url || '');
    if (d.type === 'title')  return;  // keep the tab title fixed to the server address
    if (d.type === 'selection') return (selCache = d.text || '');
    if (d.type === 'status') return (stEl.textContent = d.text);
  };
}

function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

/* ── Rendering ── */
const img = new Image();
img.onload = () => {
  if (canvas.width !== img.width || canvas.height !== img.height) {
    canvas.width = img.width; canvas.height = img.height;
  }
  ctx.drawImage(img, 0, 0);
  if (!gotFrame) { gotFrame = true; splash.style.display = 'none'; }
  frames++;
  const now = Date.now();
  if (now - fpsT >= 1000) { fpsEl.textContent = 'FPS: ' + frames; frames = 0; fpsT = now; }
};
function renderFrame(b64, w, h) { img.src = 'data:image/jpeg;base64,' + b64; }

/* ── Resize ── */
let resizeTimer;
function sendResize() {
  const w = Math.floor(view.clientWidth), h = Math.floor(view.clientHeight);
  if (w > 100 && h > 100) send({ type: 'resize', width: w, height: h });
}
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(sendResize, 250); });

/* ── Mouse helpers ── */
function coords(e) {
  const r = canvas.getBoundingClientRect();
  return { x: Math.round((e.clientX - r.left) * canvas.width / r.width),
           y: Math.round((e.clientY - r.top)  * canvas.height / r.height) };
}
function mbtn(b) { return b === 2 ? 'right' : b === 1 ? 'middle' : 'left'; }
function mods(e) { return { ctrlKey: e.ctrlKey, shiftKey: e.shiftKey, altKey: e.altKey, metaKey: e.metaKey }; }

/* ── Mouse events ── */
let btnMask = 0;  // bitmask of buttons currently held (1=left,2=right,4=middle)
const maskBit = (b) => b === 2 ? 2 : b === 1 ? 4 : 1;

canvas.addEventListener('mousedown', (e) => {
  e.preventDefault(); canvas.focus();
  btnMask |= maskBit(e.button);
  const c = coords(e);
  send({ type:'mouse', eventType:'mousePressed', ...c, button: mbtn(e.button), clickCount: e.detail || 1, ...mods(e) });
});
canvas.addEventListener('mouseup', (e) => {
  e.preventDefault();
  btnMask &= ~maskBit(e.button);
  const c = coords(e);
  send({ type:'mouse', eventType:'mouseReleased', ...c, button: mbtn(e.button), clickCount: e.detail || 1, ...mods(e) });
  // Refresh the cached remote selection so a following Ctrl+C can copy it
  // synchronously (the local clipboard API is blocked over plain http).
  if (e.button === 0) send({ type:'copy' });
});
// A button released outside the canvas would otherwise stay "stuck" down.
window.addEventListener('mouseup', (e) => { btnMask &= ~maskBit(e.button); });

let lastMove = 0;
canvas.addEventListener('mousemove', (e) => {
  // While dragging (selecting) send every move for a smooth selection;
  // otherwise throttle plain hover moves.
  const now = Date.now();
  if (!btnMask && now - lastMove < 40) return;
  lastMove = now;
  const c = coords(e);
  send({ type:'mouse', eventType:'mouseMoved', ...c, buttons: btnMask, ...mods(e) });
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const c = coords(e);
  let dx = e.deltaX, dy = e.deltaY;
  if (e.deltaMode === 1) { dx *= 40; dy *= 40; }
  if (e.deltaMode === 2) { dx *= 800; dy *= 600; }
  send({ type:'mouse', eventType:'mouseWheel', ...c, deltaX: dx, deltaY: dy });
}, { passive: false });

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

/* ── Touch events (mobile) ── */
function touchCoords(touch) {
  const r = canvas.getBoundingClientRect();
  return { x: Math.round((touch.clientX - r.left) * canvas.width / r.width),
           y: Math.round((touch.clientY - r.top)  * canvas.height / r.height) };
}

let touchStartTime = 0, touchStartPos = null, touchScrolling = false;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault(); canvas.focus();
  if (e.touches.length !== 1) return;
  const t = e.touches[0];
  touchStartPos = touchCoords(t);
  touchStartTime = Date.now();
  touchScrolling = false;
  send({ type:'mouse', eventType:'mouseMoved', ...touchStartPos });
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length !== 1 || !touchStartPos) return;
  const c = touchCoords(e.touches[0]);
  if (!touchScrolling) {
    const dx = Math.abs(c.x - touchStartPos.x), dy = Math.abs(c.y - touchStartPos.y);
    if (dx > 8 || dy > 8) touchScrolling = true;
    else return;
  }
  const prevC = touchStartPos;
  const deltaX = (prevC.x - c.x) * 2;
  const deltaY = (prevC.y - c.y) * 2;
  send({ type:'mouse', eventType:'mouseWheel', ...touchStartPos, deltaX, deltaY });
  touchStartPos = c;
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!touchStartPos) return;
  if (!touchScrolling && Date.now() - touchStartTime < 400) {
    send({ type:'mouse', eventType:'mousePressed', ...touchStartPos, button:'left', clickCount:1 });
    send({ type:'mouse', eventType:'mouseReleased', ...touchStartPos, button:'left', clickCount:1 });
  }
  touchStartPos = null; touchScrolling = false;
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => {
  touchStartPos = null; touchScrolling = false;
});

/* ── Clipboard bridge ──
   The local clipboard API (navigator.clipboard) only works in a "secure
   context": https, or http://localhost. Over plain http to a LAN IP it is
   unavailable, so we keep a mirror of the remote selection (selCache, refreshed
   on every mouse-up) and copy it inside the Ctrl+C keypress via execCommand —
   which is allowed because it runs within the user gesture.
   Paste of the *local* clipboard needs the async read API and therefore https
   or localhost; over plain http we fall back to the remote clipboard. */
let selCache = '';

function writeLocalClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => execCopy(text));
  } else {
    execCopy(text);
  }
}
function execCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.top = '0'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta); canvas.focus();
  return ok;
}
async function readLocalClipboard() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    try { return await navigator.clipboard.readText(); } catch (e) {}
  }
  return null;
}

/* ── Keyboard ── */
canvas.addEventListener('keydown', async (e) => {
  if (document.activeElement === urlBar) return;
  const mod = e.ctrlKey || e.metaKey;
  const k = e.key.toLowerCase();
  // Copy: write the mirrored remote selection to the local clipboard, in-gesture.
  if (mod && k === 'c') {
    e.preventDefault();
    writeLocalClipboard(selCache);
    stEl.textContent = selCache ? 'Copied ' + selCache.length + ' chars' : 'Nothing selected';
    return;
  }
  // Paste: push the local clipboard into the remote page.
  if (mod && k === 'v') {
    e.preventDefault();
    const text = await readLocalClipboard();
    if (text != null) {
      send({ type: 'paste', text });
    } else {
      // No local clipboard access (plain http) — let the remote page paste its own.
      send({ type:'key', eventType:'keyDown', key:e.key, code:e.code, keyCode:e.keyCode, ...mods(e) });
      stEl.textContent = 'Local clipboard needs https/localhost — used remote clipboard';
    }
    return;
  }
  e.preventDefault();
  send({ type:'key', eventType:'keyDown', key:e.key, code:e.code, keyCode:e.keyCode, ...mods(e) });
});
canvas.addEventListener('keyup', (e) => {
  if (document.activeElement === urlBar) return;
  e.preventDefault();
  send({ type:'key', eventType:'keyUp', key:e.key, code:e.code, keyCode:e.keyCode, ...mods(e) });
});

/* ── Navigation ── */
function go(url) {
  if (!url) return;
  stEl.textContent = 'Loading ' + url + '…';
  send({ type:'navigate', url: url });
  urlBar.blur();
  canvas.focus();
}

document.getElementById('url-form').addEventListener('submit', (e) => { e.preventDefault(); go(urlBar.value); });
document.getElementById('b-back').addEventListener('click', () => { send({type:'back'}); canvas.focus(); });
document.getElementById('b-fwd').addEventListener('click',  () => { send({type:'forward'}); canvas.focus(); });
document.getElementById('b-rel').addEventListener('click',  () => { send({type:'reload'}); canvas.focus(); });

/* ── Start ── */
// Keep the tab title as just the server address; never expose the app or the
// site being viewed. Re-pin it in case anything tries to change it.
const PINNED_TITLE = location.hostname;
document.title = PINNED_TITLE;
setInterval(() => { if (document.title !== PINNED_TITLE) document.title = PINNED_TITLE; }, 1000);
connect();
canvas.focus();
</script>
</body>
</html>
